name: Quality Checks
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v6

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          fail: true

  fmt:
    name: Formatting (rustfmt)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - target: x86_64-unknown-linux-gnu

    steps:
      - name: Code checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.platform.target }}
          components: rustfmt

      - name: Formatting (rustfmt)
        run: cargo fmt --all -- --check

  test:
    name: Tests (Docker)
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build dev container
        uses: docker/build-push-action@v7
        with:
          context: .
          target: dev
          push: false
          load: true
          tags: binwalk-ng:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        id: run_tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/tmp/binwalk" \
            -e CI=true \
            -e INSTA_UPDATE=new \
            binwalk-ng:dev \
            cargo insta test --unreferenced=reject

      - name: Upload new snapshots
        if: ${{ failure() && steps.run_tests.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: new-snapshots
          path: "**/snapshots/*.snap.new"

  clippy:
    name: Lint (clippy)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - target: x86_64-unknown-linux-gnu

    steps:
      - name: Code checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.platform.target }}
          components: clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform.target }}

      - name: Clippy (all crates)
        run: cargo clippy --locked --target=${{ matrix.platform.target }} --workspace --all-targets --all-features -- -D warnings
